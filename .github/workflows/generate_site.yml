name: Deploy ontology site

on:
  push:
    branches: [main]
    paths:
      - "terms/**.json"
      - "references/**.json"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6.0.0

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Generate HTML site
        run: python scripts/generate_site.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - id: deployment
        uses: actions/deploy-pages@v4