name: Validate glossary entries

on:
  workflow_dispatch:
  push:
    paths:
      - "terms/**.json"
      - "references/**.json"
      - "properties/**.json"

jobs:
  validate:
    name: Validate glossary elements, inject attributes & commit
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push the injected missing data back

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.0
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0  # full history required for inject_dates and inject_contributors

      - name: Ensure required directories exist
        run: |
          mkdir -p terms references properties
          git add terms references properties

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── Validation (runs first, blocks everything if it fails) ──

      - name: Validate all entries
        run: python scripts/validate_glossary.py

      # ── Injection (runs only if validation passed) ──

      - name: Inject UUIDs and rename files
        run: python scripts/inject_uuids.py

      - name: Inject missing IDs
        run: python scripts/inject_ids.py

      - name: Inject relational URIs
        run: python scripts/inject_uris.py

      - name: Inject 3SE internal links
        run: python scripts/inject_3se_links.py

      - name: Inject breakdown structure role links
        run: python scripts/inject_bs_roles.py

      - name: Inject created/updated dates
        run: python scripts/inject_dates.py

      - name: Inject contributors
        run: python scripts/inject_contributors.py

      # ── Commit enriched fields back ──

      - name: Collect changed files
        id: changed
        run: |
          patterns=""
          for dir in terms references properties; do
            if compgen -G "$dir/*.json" > /dev/null 2>&1; then
              patterns="$patterns $dir/*.json"
            fi
          done
          echo "file_pattern=${patterns# }" >> $GITHUB_OUTPUT

      - name: Commit injected fields (if any)
        if: steps.changed.outputs.file_pattern != ''
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "main: inject missing ids, dates and contributors [skip ci]"
          file_pattern: ${{ steps.changed.outputs.file_pattern }}
